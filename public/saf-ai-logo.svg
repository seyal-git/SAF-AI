<svg xmlns="http://www.w3.org/2000/svg" width="560" height="180" viewBox="0 0 560 180" role="img" aria-labelledby="title desc">
  <title id="title">SAF.AI by Cambium logo</title>
  <desc id="desc">Shield emblem with SAF.AI by Cambium wordmark</desc>

  <defs>
    <style>
      .navy { stroke: #11195f; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .orange { stroke: #f47d24; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect x="0" y="0" width="560" height="180" rx="18" fill="#f6e8d5" />

  <!-- Icon -->
  <g transform="translate(20 14)">
    <circle cx="70" cy="76" r="62" class="navy" stroke-width="5"/>
    <circle cx="70" cy="76" r="54" class="orange" stroke-width="5" stroke-dasharray="150 80"/>
    <circle cx="70" cy="76" r="44" class="navy" stroke-width="5" stroke-dasharray="130 60"/>
    <circle cx="70" cy="76" r="34" class="navy" stroke-width="4" stroke-dasharray="80 70"/>

    <path d="M70 30 L102 47 L98 80 C94 101 84 116 70 125 C56 116 46 101 42 80 L38 47 Z"
      class="navy" stroke-width="6"/>
    <path d="M70 42 L90 53 L87 78 C84 93 78 104 70 110 C62 104 56 93 53 78 L50 53 Z"
      class="orange" stroke-width="4"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(165 42)">
    <text x="0" y="52" font-family="Inter, Arial, sans-serif" font-size="78" font-weight="800" fill="#11195f" letter-spacing="1">SAF</text>
    <text x="180" y="52" font-family="Inter, Arial, sans-serif" font-size="78" font-weight="800" fill="#f47d24">.AI</text>

    <g transform="translate(4 92)">
      <circle cx="24" cy="24" r="22" class="navy" stroke-width="2.5"/>
      <circle cx="24" cy="24" r="15" class="navy" stroke-width="2" stroke-dasharray="52 14"/>
      <circle cx="24" cy="24" r="8" class="orange" stroke-width="2"/>
      <circle cx="24" cy="24" r="3" fill="#11195f"/>
      <text x="56" y="34" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="500" fill="#11195f">by Cambium</text>
    </g>
  </g>
</svg>
