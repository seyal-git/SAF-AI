<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 180" role="img" aria-labelledby="title desc">
  <title id="title">Matrix logo</title>
  <desc id="desc">Matrix wordmark with blue dot pattern</desc>

  <defs>
    <radialGradient id="bubbleBlue" cx="35%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#77d7ff"/>
      <stop offset="55%" stop-color="#1da6e2"/>
      <stop offset="100%" stop-color="#2458ad"/>
    </radialGradient>
  </defs>

  <rect width="520" height="180" fill="#ffffff" rx="10"/>

  <text
    x="24"
    y="116"
    font-size="92"
    font-style="italic"
    font-weight="700"
    font-family="Arial, Helvetica, sans-serif"
    fill="#6e1b86"
    letter-spacing="-2"
  >
    matrix
  </text>

  <g transform="translate(356 28)">
    <circle cx="24" cy="24" r="18" fill="url(#bubbleBlue)" stroke="#1f4d97" stroke-width="2"/>
    <circle cx="64" cy="18" r="14" fill="url(#bubbleBlue)" stroke="#1f4d97" stroke-width="2"/>
    <circle cx="93" cy="31" r="12" fill="url(#bubbleBlue)" stroke="#1f4d97" stroke-width="2"/>
    <circle cx="106" cy="58" r="10" fill="url(#bubbleBlue)" stroke="#1f4d97" stroke-width="2"/>
    <circle cx="82" cy="77" r="16" fill="url(#bubbleBlue)" stroke="#1f4d97" stroke-width="2"/>
    <circle cx="48" cy="86" r="18" fill="url(#bubbleBlue)" stroke="#1f4d97" stroke-width="2"/>
    <circle cx="19" cy="68" r="14" fill="url(#bubbleBlue)" stroke="#1f4d97" stroke-width="2"/>
    <circle cx="55" cy="52" r="13" fill="url(#bubbleBlue)" stroke="#1f4d97" stroke-width="2"/>
  </g>
</svg>
