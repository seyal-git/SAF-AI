<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 340" role="img" aria-labelledby="title desc">
  <title id="title">Assuta hospital logo</title>
  <desc id="desc">Assuta wordmark in blue with green underline</desc>

  <rect width="760" height="340" fill="#ffffff" rx="12"/>

  <g fill="#1a4d95" font-family="Arial, Helvetica, sans-serif">
    <text x="304" y="126" font-size="54" font-weight="700">Hospital</text>
    <text x="124" y="214" font-size="150" font-weight="800" font-style="italic">Assuta</text>
    <text x="124" y="280" font-size="48" font-weight="600">A standard of health</text>
  </g>

  <circle cx="452" cy="154" r="10" fill="#40b84a"/>
  <rect x="440" y="250" width="214" height="12" rx="6" fill="#40b84a"/>
